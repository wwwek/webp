<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  
  <title>图片转WebP · 悬浮下载按钮</title>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    
  <style>
    * {
      margin: 0;
      padding: 0;
      /*border-style: solid;
      border-width: 1px;
      border-color: #ffcccc;
      box-sizing: border-box;*/
    }
    
    body {
      width: 100vw; 
      min-height: 100vh; 
      margin: 0;
      padding: 0;
      overflow-x: hidden;
    }
      
    .flex {
      display: flex; 
    }
    
    .column {
      display: flex; 
      flex-direction: column; 
    }
    
    .space-between {
      justify-content: space-between; 
    }
    
    .x-center {
      justify-content: center; 
    }
    
    .y-center {
      align-items: center; 
    }
    
.file-info {
  display: flex;
  align-items: center;
  gap: 12px;
  flex: 1;      /* 占据左侧剩余空间 */
  min-width: 0; /* 关键：允许子元素（文字）在 Flex 容器内收缩以触发换行 */
}

.file-name {
  font-size: 0.9rem;
  color: #ECE6F2;       /* 匹配你设置的文字颜色 */
  word-break: break-all; /* 强制长文件名换行，防止撑开屏幕 */
  white-space: normal;   /* 允许正常换行 */
}
    
    /* 预览图样式 */
    .file-preview {
      width: 100px;
      height: 100px;
      object-fit: cover;
      border-radius: 8px;
      background: #fff;
    }
    
    /* 图片右侧小下载按钮 */
.file-item {
  background: rgba(255, 255, 255, 0.1); /* 改为半透明，适应你的深色背景 */
  border: 1px solid rgba(255, 255, 255, 0.2); 
  border-radius: 16px;
  padding: 12px;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  min-height: 40.625vw;   /* 根据实际内容调整，建议与图片预览区域高度匹配 */
  transition: opacity 0.2s ease;
}

/* 为 .file-item 添加 loading 状态的视觉反馈 */
.file-item.loading {
    opacity: 0.6;
    transition: opacity 0.2s ease;
}

/* 占位符动画效果（可选） */
.file-preview-placeholder {
    background: #333;
    animation: pulse 1.2s infinite ease-in-out;
}

@keyframes pulse {
    0% { opacity: 0.6; }
    50% { opacity: 0.9; }
    100% { opacity: 0.6; }
}

/* 预览图在加载时半透明过渡 */
.file-preview {
    transition: opacity 0.2s ease;
}

.download-btn {
  background: #1a73e8;
  color: white;
  border: none;
  border-radius: 40px;
  padding: 8px 16px;
  font-size: 0.8rem;
  cursor: pointer;
  flex-shrink: 0; /* 防止按钮被挤压变形 */
}
    
    .beijing {
      background-color: #1A4C4F; 
    }
    
    .gaobeijing {
       background-color: #266C70; 
       box-shadow: 5px 5px 10px rgba(0, 0, 0, 0.3);
    }
    
    .yuanjiao {
      border-radius: 20px; 
    }
    
    .daohanglan {
      height: 60px;
      width: 100%;
      position: sticky;
      bottom: 0;
      right: 0;
      z-index: 1000;
      cursor: pointer; 
      overflow: hidden; 
      background: linear-gradient(to right, #676E5C, #5C6E5C, #5C6E6A, #5C6A6E);
       /* 原有样式保持不变 */
  visibility: visible;
  opacity: 1;
  pointer-events: auto;
  transition: opacity 0.2s ease, visibility 0.2s ease;
    }
    
    .daohanglan.hidden {
  visibility: hidden;
  opacity: 0;
  pointer-events: none;
}
    
    .daohanglan::before {
        content: "";
        position: absolute;
        top: 0; 
        left: -100%;
        height: 100%; 
        width: 100%; 
        background: linear-gradient(90deg, transparent, rgba(255, 255, 255, .2), transparent);
        animation: glow 1.5s linear infinite; 
    }
    
    @keyframes glow {
            0% {
                left: -100%; 
            }
            100% {
            
                left: 100%; 
            }
        }
        

    </style>
</head>

<body>
<div class="beijing" style="color: #E6E6E6; padding: 40px 10px; min-height: 100vh; ">
  <!-- 一个包含所有内容的div flex column容器 -->
  <div class="column space-between" style="min-height: 200vw; gap: 20px; ">
  
        <h1 style="flex: 1" class="flex x-center y-center gaobeijing yuanjiao">✨ 图片转 WebP</h1>
        <div style="flex: 1" class="flex x-center y-center gaobeijing yuanjiao">批量转换 · 悬浮下载按钮 · 本地隐私安全</div>

        <div class="flex yuanjiao " style="overflow: hidden; gap: 10px; ">
            <div id="uploadFromMedia" style="flex: 1; aspect-ratio: 1 / 1; ; " class="flex x-center y-center gaobeijing yuanjiao">📸 从相册选择 (单张)</div>
            <div id="uploadFromFileAny" style="flex: 1; aspect-ratio: 1 / 1;  " class="flex x-center y-center gaobeijing yuanjiao">📁 文件管理器 (所有文件, 支持多选)</div>
        </div>
    
    
        <!-- 这里是滑动选择图片压缩质量嵌套 -->
        <div class="column x-center y-center gaobeijing yuanjiao" style="flex: 1">
            <div>
                <span>🎨 压缩质量</span>
                <span id="qualityValue">92</span><span>%</span>
            </div>
            <input type="range" id="qualitySlider" min="1" max="100" value="92" step="1" style="width: 95%; ">
        </div>
    
        <div style="flex: 1; gap: 10px; " class="column x-center y-center">
           <!-- 图片列表根容器，选择的图片会显示在这里，并且替换掉原有文字 -->
           <div id="filesContainer" class="gaobeijing yuanjiao">
              <div>选择图片后，将自动转换为 WebP 并显示在此处</div>            
           </div>
          
           <!-- 悬浮按钮 -->
           <button id="downloadButton" class="daohanglan yuanjiao hidden" style="border: none; outline: none">📦 打包下载全部 (ZIP)</button>
        </div>

        <div style="flex: 1" class="flex x-center y-center gaobeijing yuanjiao">
            💡 手机提示：如果默认打开相册导致卡顿，请使用「文件管理器 (所有文件)」按钮，
            它会直接调用系统文件管理器，你可以手动进入文件夹选择图片。
        </div>

        <div style="flex: 1" class="flex x-center y-center gaobeijing yuanjiao">
            🔒 所有转换都在你的设备上完成，图片不上传服务器。<br>
            📦 多图时一键打包ZIP，单图时直接下载。按钮始终固定在屏幕底部。
        </div>
  </div>
  <!-- 一个包含所有内容的div flex column容器，已闭合 -->

</div>
  
<script>
    (function() {
        // DOM 元素
        const mediaBtn = document.getElementById('uploadFromMedia');
        const fileAnyBtn = document.getElementById('uploadFromFileAny');
        const qualitySlider = document.getElementById('qualitySlider');
        const qualityValue = document.getElementById('qualityValue');
        const filesContainer = document.getElementById('filesContainer');
        const downloadButton = document.getElementById('downloadButton');

        let convertedFiles = [];        // 存储 { originalFile, webpBlob, fileName }
        let pendingCount = 0;           // 正在转换的图片数量

        // 更新按钮显示和功能
        function updateDownloadButton() {
    const count = convertedFiles.length;
    if (count === 0) {
        downloadButton.classList.add('hidden');
        return;
    }
    downloadButton.classList.remove('hidden');
    if (count === 1) {
        downloadButton.textContent = '⬇️ 下载图片';
        downloadButton.onclick = () => {
            const item = convertedFiles[0];
            downloadBlob(item.webpBlob, item.fileName);
        };
    } else {
        downloadButton.textContent = '📦 打包下载全部 (ZIP)';
        downloadButton.onclick = downloadAllAsZip;
    }
}

        // 质量变化时，重新转换所有图片（松开滑块才执行）
        qualitySlider.addEventListener('input', (e) => {
            qualityValue.textContent = e.target.value;
        });
        qualitySlider.addEventListener('change', (e) => {
            if (convertedFiles.length > 0) reConvertAll();
        });

        // 创建临时 file input
        function createFileInput(multiple, accept) {
            const input = document.createElement('input');
            input.type = 'file';
            if (accept !== undefined) input.accept = accept;
            input.multiple = multiple;
            input.style.display = 'none';
            document.body.appendChild(input);
            return input;
        }

        // 处理选中的文件（过滤非图片）—— 新增占位符逻辑，消除初次闪烁
        function handleFiles(files) {
            if (!files || files.length === 0) return;
            const imageFiles = Array.from(files).filter(f => f.type.startsWith('image/'));
            if (imageFiles.length === 0) {
                showError('未选择任何图片文件，请选择 PNG/JPG/BMP 等格式');
                return;
            }
            convertedFiles = [];
            filesContainer.innerHTML = '';

            // 1. 为每个图片创建占位符，撑开容器高度
            const placeholders = [];
            imageFiles.forEach((file, idx) => {
                const div = document.createElement('div');
                div.className = 'file-item loading';
                // 设置最小高度，避免空内容时高度塌陷
                div.style.minHeight = '130px';
                div.innerHTML = `
                    <div class="file-info">
                        <div class="file-preview-placeholder" style="width:100px;height:100px;background:#333;border-radius:8px;"></div>
                        <span class="file-name" style="opacity:0.6;">加载中...</span>
                    </div>
                    <button class="download-btn" disabled>⬇️ 下载</button>
                `;
                filesContainer.appendChild(div);
                placeholders.push(div);
            });

            pendingCount = imageFiles.length;
            // 2. 开始转换每张图片，完成后更新对应的占位符
            imageFiles.forEach((file, idx) => {
                convertSingleFile(file, placeholders[idx], idx);
            });
        }

        // 转换单个图片（支持更新占位符）
        function convertSingleFile(file, targetDiv, index) {
            const quality = parseInt(qualitySlider.value);
            const img = new Image();
            const url = URL.createObjectURL(file);
            img.onload = () => {
                const canvas = document.createElement('canvas');
                canvas.width = img.width;
                canvas.height = img.height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0);
                canvas.toBlob((blob) => {
                    if (blob) {
                        const converted = {
                            originalFile: file,
                            webpBlob: blob,
                            fileName: file.name.replace(/\.[^/.]+$/, '') + '.webp'
                        };
                        convertedFiles.push(converted);
                        if (targetDiv) {
                            // 更新占位符内容为真实图片
                            const previewUrl = URL.createObjectURL(blob);
                            targetDiv.innerHTML = `
                                <div class="file-info">
                                    <img class="file-preview" src="${previewUrl}" alt="preview">
                                    <span class="file-name">${escapeHtml(converted.fileName)}</span>
                                </div>
                                <button class="download-btn" data-filename="${converted.fileName}">⬇️ 下载</button>
                            `;
                            targetDiv.classList.remove('loading');
                            const btn = targetDiv.querySelector('.download-btn');
                            btn.addEventListener('click', () => downloadBlob(converted.webpBlob, converted.fileName));
                        } else {
                            // 降级：直接渲染新项
                            renderFileItem(converted);
                        }
                    } else {
                        showError(`${file.name} 转换失败，可能浏览器不支持 WebP 编码`);
                        if (targetDiv) targetDiv.remove(); // 转换失败则移除占位符
                    }
                    URL.revokeObjectURL(url);
                    pendingCount--;
                    if (pendingCount === 0) updateDownloadButton();
                }, 'image/webp', quality / 100);
            };
            img.onerror = () => {
                showError(`${file.name} 加载失败`);
                URL.revokeObjectURL(url);
                if (targetDiv) targetDiv.remove();
                pendingCount--;
                if (pendingCount === 0) updateDownloadButton();
            };
            img.src = url;
        }

        // 直接渲染单个文件项（初次使用或降级）
        function renderFileItem(item) {
            const div = document.createElement('div');
            div.className = 'file-item';
            const previewUrl = URL.createObjectURL(item.webpBlob);
            div.innerHTML = `
                <div class="file-info">
                    <img class="file-preview" src="${previewUrl}" alt="preview">
                    <span class="file-name">${escapeHtml(item.fileName)}</span>
                </div>
                <button class="download-btn" data-filename="${item.fileName}">⬇️ 下载</button>
            `;
            filesContainer.appendChild(div);
            const btn = div.querySelector('.download-btn');
            btn.addEventListener('click', () => downloadBlob(item.webpBlob, item.fileName));
        }

        // ========== 重新转换所有图片（保持高度稳定） ==========
        function reConvertAll() {
            if (convertedFiles.length === 0) return;

            // 获取当前所有图片项
            const items = document.querySelectorAll('.file-item');
            // 建立原文件 -> DOM 元素的映射
            const fileToItem = new Map();
            items.forEach((item, idx) => {
                if (convertedFiles[idx]) {
                    fileToItem.set(convertedFiles[idx].originalFile, item);
                }
            });

            // 为每个现有项添加 loading 状态（保持高度，视觉反馈）
            items.forEach(item => {
                item.classList.add('loading');
                const preview = item.querySelector('.file-preview');
                if (preview) preview.style.opacity = '0.5';
            });

            // 保存所有待转换的文件列表（复制一份）
            const filesToConvert = [...convertedFiles];
            // 清空全局数组，等待新结果填充
            convertedFiles = [];
            let completedCount = 0;

            filesToConvert.forEach((oldItem, index) => {
                const file = oldItem.originalFile;
                const oldDom = fileToItem.get(file);
                const quality = parseInt(qualitySlider.value);
                const img = new Image();
                const url = URL.createObjectURL(file);

                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = img.width;
                    canvas.height = img.height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0);
                    canvas.toBlob((blob) => {
                        if (blob) {
                            const newItem = {
                                originalFile: file,
                                webpBlob: blob,
                                fileName: file.name.replace(/\.[^/.]+$/, '') + '.webp'
                            };
                            convertedFiles.push(newItem);
                            if (oldDom) {
                                // 更新已有 DOM 元素的内容
                                const previewUrl = URL.createObjectURL(blob);
                                const previewImg = oldDom.querySelector('.file-preview');
                                if (previewImg) {
                                    previewImg.src = previewUrl;
                                    previewImg.style.opacity = '';
                                }
                                const fileNameSpan = oldDom.querySelector('.file-name');
                                if (fileNameSpan) fileNameSpan.textContent = escapeHtml(newItem.fileName);
                                const downloadBtn = oldDom.querySelector('.download-btn');
                                if (downloadBtn) {
                                    downloadBtn.onclick = () => downloadBlob(blob, newItem.fileName);
                                }
                                oldDom.classList.remove('loading');
                            } else {
                                renderFileItem(newItem);
                            }
                        } else {
                            showError(`${file.name} 转换失败`);
                            if (oldDom) oldDom.classList.remove('loading');
                        }
                        URL.revokeObjectURL(url);
                        completedCount++;
                        if (completedCount === filesToConvert.length) {
                            // 清除残留的 loading 状态
                            document.querySelectorAll('.file-item.loading').forEach(el => {
                                el.classList.remove('loading');
                                const preview = el.querySelector('.file-preview');
                                if (preview) preview.style.opacity = '';
                            });
                            updateDownloadButton();
                        }
                    }, 'image/webp', quality / 100);
                };

                img.onerror = () => {
                    showError(`${file.name} 加载失败`);
                    URL.revokeObjectURL(url);
                    if (oldDom) oldDom.classList.remove('loading');
                    completedCount++;
                    if (completedCount === filesToConvert.length) {
                        document.querySelectorAll('.file-item.loading').forEach(el => el.classList.remove('loading'));
                        updateDownloadButton();
                    }
                };
                img.src = url;
            });
        }
        // ========== 结束 ==========

        // 下载 Blob
        function downloadBlob(blob, fileName) {
            const link = document.createElement('a');
            const url = URL.createObjectURL(blob);
            link.href = url;
            link.download = fileName;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        }

        // 打包下载 ZIP
        async function downloadAllAsZip() {
            if (convertedFiles.length === 0) return;
            const zip = new JSZip();
            for (const item of convertedFiles) {
                zip.file(item.fileName, item.webpBlob);
            }
            const zipBlob = await zip.generateAsync({ type: 'blob' });
            downloadBlob(zipBlob, 'webp_images.zip');
        }

        // 显示错误
        function showError(msg) {
            const errDiv = document.createElement('div');
            errDiv.style.color = '#d93025';
            errDiv.style.margin = '8px 0';
            errDiv.innerText = msg;
            filesContainer.appendChild(errDiv);
            setTimeout(() => errDiv.remove(), 3000);
        }

        // 转义 HTML
        function escapeHtml(str) {
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // 按钮事件
        mediaBtn.addEventListener('click', () => {
            const input = createFileInput(false, 'image/*');
            input.onchange = (e) => {
                if (e.target.files && e.target.files[0]) handleFiles([e.target.files[0]]);
                input.remove();
            };
            input.click();
        });

        fileAnyBtn.addEventListener('click', () => {
            const input = createFileInput(true, undefined);
            input.onchange = (e) => {
                if (e.target.files && e.target.files.length) {
                    handleFiles(Array.from(e.target.files));
                }
                input.remove();
            };
            input.click();
        });
    })();
</script>
</body>
</html>
